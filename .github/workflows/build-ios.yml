# ============================================================
# uni-app x iOS 云打包 — GitHub Actions 全自动构建
# ============================================================
# 原理: macOS runner 上运行 HBuilderX CLI，项目上传 DCloud
#       云端 Mac 服务器完成 iOS 编译，下载 IPA 产物。
#
# 你只需要在 GitHub Secrets 配置 3 个:
#   DCLOUD_USERNAME  — DCloud 开发者中心账号 (免费注册 dev.dcloud.net.cn)
#   DCLOUD_PASSWORD  — DCloud 开发者中心密码
#   IOS_BUNDLE_ID    — App Bundle ID, 如 com.qingfeng.iosweb
#
# 证书可选 (有证书时自动使用，没有则尝试 DCloud 默认签名):
#   IOS_CERT_PASSWORD   — .p12 证书密码
#   IOS_P12_BASE64      — .p12 证书的 Base64
#   IOS_PROFILE_BASE64  — .mobileprovision 的 Base64
# ============================================================

name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      bundle_id:
        description: 'iOS Bundle ID'
        required: false
        default: 'com.qingfeng.iosweb'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ---- 1. 检出代码 ----
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 2. 缓存 HBuilderX (~500MB, 避免每次下载) ----
      - name: Cache HBuilderX.app
        id: cache-hbx
        uses: actions/cache@v4
        with:
          path: /tmp/HBuilderX.app
          key: hbuilderx-mac-v1

      - name: Download HBuilderX
        if: steps.cache-hbx.outputs.cache-hit != 'true'
        run: |
          set -e
          echo "::group::Download HBuilderX"
          URLS=(
            "https://download1.dcloud.net.cn/HBuilderX.dmg"
            "https://qiniu-download-public.dcloud.net.cn/udiskfile/HBuilderX.dmg"
            "https://download.dcloud.net.cn/HBuilderX.dmg"
          )
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -fSL -o /tmp/HBuilderX.dmg "$URL" 2>/dev/null; then
              echo "Download OK"
              break
            fi
            echo "Failed, trying next..."
          done
          echo "::endgroup::"

          echo "::group::Mount DMG & Install"
          hdiutil attach /tmp/HBuilderX.dmg -mountpoint /tmp/hbx_mount -nobrowse -quiet
          cp -R /tmp/hbx_mount/HBuilderX.app /tmp/HBuilderX.app
          hdiutil detach /tmp/hbx_mount -quiet
          echo "HBuilderX installed to /tmp/HBuilderX.app"
          echo "::endgroup::"

      # ---- 3. 解码证书 (可选, 仅当 secrets 存在时) ----
      - name: Decode iOS Certificates
        id: certs
        run: |
          mkdir -p /tmp/certs
          HAS_CERTS="false"

          if [ -n "${{ secrets.IOS_P12_BASE64 }}" ] && [ "${{ secrets.IOS_P12_BASE64 }}" != "" ]; then
            echo "${{ secrets.IOS_P12_BASE64 }}" | base64 -d > /tmp/certs/cert.p12
            echo "cert.p12 decoded"
            echo "p12_path=/tmp/certs/cert.p12" >> $GITHUB_OUTPUT
            HAS_CERTS="true"
          else
            echo "No IOS_P12_BASE64 secret found"
          fi

          if [ -n "${{ secrets.IOS_PROFILE_BASE64 }}" ] && [ "${{ secrets.IOS_PROFILE_BASE64 }}" != "" ]; then
            echo "${{ secrets.IOS_PROFILE_BASE64 }}" | base64 -d > /tmp/certs/profile.mobileprovision
            echo "profile.mobileprovision decoded"
            echo "profile_path=/tmp/certs/profile.mobileprovision" >> $GITHUB_OUTPUT
          else
            echo "No IOS_PROFILE_BASE64 secret found"
          fi

          echo "has_certs=$HAS_CERTS" >> $GITHUB_OUTPUT
          echo "cert_password=${{ secrets.IOS_CERT_PASSWORD }}" >> $GITHUB_OUTPUT

      # ---- 4. 启动 HBuilderX ----
      - name: Start HBuilderX
        run: |
          CLI="/tmp/HBuilderX.app/Contents/MacOS/cli"
          echo "Starting HBuilderX..."
          "$CLI" open &
          sleep 15
          echo "HBuilderX started (PID: $!)"

      # ---- 5. 登录 DCloud ----
      - name: Login to DCloud
        run: |
          CLI="/tmp/HBuilderX.app/Contents/MacOS/cli"
          echo "Logging in to DCloud..."
          "$CLI" user login --username "${{ secrets.DCLOUD_USERNAME }}" --password "${{ secrets.DCLOUD_PASSWORD }}"
          echo "Login result: $?"
          "$CLI" user info || echo "(info not available, continuing)"

      # ---- 6. 云打包 iOS ----
      - name: Cloud Package for iOS
        id: pack
        run: |
          CLI="/tmp/HBuilderX.app/Contents/MacOS/cli"
          BUNDLE_ID="${{ github.event.inputs.bundle_id || secrets.IOS_BUNDLE_ID }}"

          echo "============================================"
          echo "Bundle ID : $BUNDLE_ID"
          echo "Has certs : ${{ steps.certs.outputs.has_certs }}"
          echo "============================================"

          # 参数数组
          PACK_ARGS=(
            --project "$GITHUB_WORKSPACE"
            --platform ios
            --ios.bundle "$BUNDLE_ID"
            --ios.supporteddevice iPhone
          )

          # 如果有证书则附加
          if [ "${{ steps.certs.outputs.has_certs }}" = "true" ]; then
            echo "Using custom certificates"
            PACK_ARGS+=(
              --ios.profile "${{ steps.certs.outputs.profile_path }}"
              --ios.certfile "${{ steps.certs.outputs.p12_path }}"
              --ios.certpassword "${{ steps.certs.outputs.cert_password }}"
            )
          else
            echo "No certificates provided — trying DCloud default signing..."
          fi

          echo ""
          echo "CLI command: $CLI pack ${PACK_ARGS[*]}"

          # 执行打包 (超时 30 分钟)
          timeout 1800 "$CLI" pack "${PACK_ARGS[@]}" 2>&1 | tee /tmp/pack_output.log
          PACK_EXIT=${PIPESTATUS[0]}

          # 提取下载地址
          DOWNLOAD_URL=$(grep -oP '下载地址:\s*\Khttps?://[^\s]+' /tmp/pack_output.log | head -1)

          if [ -n "$DOWNLOAD_URL" ]; then
            echo "============================================"
            echo "Pack SUCCESS! URL: $DOWNLOAD_URL"
            echo "============================================"
            echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          else
            echo "============================================"
            echo "Pack FAILED or URL not found in output"
            echo "(exit code: $PACK_EXIT)"
            cat /tmp/pack_output.log
            echo "============================================"
            exit 1
          fi

      # ---- 7. 下载 IPA ----
      - name: Download IPA
        run: |
          URL="${{ steps.pack.outputs.download_url }}"
          echo "Downloading: $URL"
          curl -fSL -o "$GITHUB_WORKSPACE/iosweb.ipa" "$URL"
          ls -lh "$GITHUB_WORKSPACE/iosweb.ipa"
          echo "IPA downloaded successfully"

      # ---- 8. 上传 IPA Artifact ----
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosweb-${{ github.run_number }}.ipa
          path: "*.ipa"
          retention-days: 7
