# ============================================================
# uni-app x iOS 离线打包 — GitHub Actions 纯 Xcode 编译
# ============================================================
# 原理: 不需要 DCloud 云打包 / 不需要 Apple 开发者账号
#       macOS runner 下载 iOS SDK → 配合你已生成的资源
#       → xcodebuild 编译 → 生成未签名 IPA（裸包）
#
# 不需要任何 Secrets！纯自动。
# ============================================================

name: Build iOS IPA (Offline)

on:
  push:
    branches: [main]
    paths:
      - 'native-ios/**'
      - 'unpackage/resources/app-ios/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 1. 缓存 SDK (第一次慢，后面秒过) ----
      - name: Cache iOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: native-ios/SDK
          key: uniappx-ios-sdk-5.07

      - name: Download iOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        timeout-minutes: 20
        run: |
          set -e
          # 多源下载：主 CDN + 备用
          URLS=(
            "https://web-ext-storage.dcloud.net.cn/uni-app-x/sdk/iOS/UniAppX-iOS%405.07.zip"
            "https://download1.dcloud.net.cn/uni-app-x/sdk/iOS/UniAppX-iOS%405.07.zip"
          )
          OK=0
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -fSL --retry 3 --retry-delay 10 --connect-timeout 30 -o /tmp/sdk.zip "$URL"; then
              echo "Download OK (size: $(ls -lh /tmp/sdk.zip | awk '{print $5}'))"
              OK=1
              break
            fi
            echo "Failed, trying next..."
            rm -f /tmp/sdk.zip
          done
          if [ "$OK" != "1" ]; then
            echo "All download sources failed!"
            exit 1
          fi
          echo "Extracting..."
          unzip -q /tmp/sdk.zip -d native-ios/SDK
          # 清理 macOS zip 元数据文件夹（这些不是真实框架，会导致编译报错）
          rm -rf native-ios/SDK/__MACOSX native-ios/SDK/_MACOSX 2>/dev/null || true
          # 删除所有 ._ 开头的隐藏文件（macOS 资源分支）
          find native-ios/SDK -name "._*" -delete 2>/dev/null || true
          rm /tmp/sdk.zip
          echo "SDK extracted"

      - name: Verify SDK
        run: |
          echo "=== xcframeworks ==="
          find native-ios/SDK -name "*.xcframework" -maxdepth 4 | sort
          echo "=== xcodeproj in SDK ==="
          find native-ios/SDK -name "*.xcodeproj" 2>/dev/null || echo "(none)"

      # ---- 2. 安装 xcodegen ----
      - name: Install xcodegen
        run: brew install xcodegen

      # ---- 3. 生成 project.yml 并创建 Xcode 工程 ----
      - name: Generate Xcode Project
        run: |
          set -e
          cd native-ios

          echo "Discovering frameworks..."
          FW_PATHS=$(find SDK -name "*.xcframework" -maxdepth 6 -type d \
            ! -path "*/__MACOSX/*" ! -path "*/_MACOSX/*" \
            ! -path "*/UniAppXDemo/*" \
            ! -path "*/TemporarySampleFramework/*" \
            ! -path "*/BURelyFoundation_Global.xcframework" | sort)
          echo "Found:"
          echo "$FW_PATHS"

          python3 gen_project.py "$FW_PATHS"

          echo ""
          echo "=== Generated project.yml ==="
          cat project.yml
          echo ""

          xcodegen generate
          echo "Xcode project generated"
          ls -la UniAppShell.xcodeproj/

      # ---- 4. 编译 (不签名) ----
      - name: Build IPA
        run: |
          set -e
          cd native-ios

          echo "=== Building (no signing) ==="
          xcodebuild \
            -project UniAppShell.xcodeproj \
            -scheme UniAppShell \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee /tmp/build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            echo ""
            echo "=== BUILD FAILED ==="
            echo "Last 30 lines of build log:"
            tail -30 /tmp/build.log
            exit 1
          fi

          echo ""
          echo "=== Build SUCCESS ==="

          # 找到 .app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "UniAppShell.app" -path "*/Release-iphoneos/*" | head -1)
          echo "App path: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -10
            exit 1
          fi

          # 打包 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "../iosweb.ipa" Payload/
          rm -rf Payload
          echo ""
          echo "=== IPA generated ==="
          ls -lh ../iosweb.ipa

      # ---- 5. 上传 IPA ----
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iosweb-offline-${{ github.run_number }}.ipa
          path: "iosweb.ipa"
          retention-days: 7
