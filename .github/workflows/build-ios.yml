# ============================================================
# uni-app x iOS 离线打包 — GitHub Actions 纯 Xcode 编译
# ============================================================
# 原理: 不需要 DCloud 云打包 / 不需要 Apple 开发者账号
#       macOS runner 下载 iOS SDK → 配合你已生成的资源
#       → xcodebuild 编译 → 生成未签名 IPA（裸包）
#
# 不需要任何 Secrets！纯自动。
# ============================================================

name: Build iOS IPA (Offline)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 1. 下载 uni-app x iOS SDK ----
      - name: Download iOS SDK
        run: |
          set -e
          SDK_URL="https://web-ext-storage.dcloud.net.cn/uni-app-x/sdk/iOS/UniAppX-iOS%405.07.zip"
          echo "Downloading SDK..."
          curl -L -o /tmp/sdk.zip "$SDK_URL"
          echo "Extracting..."
          unzip -q /tmp/sdk.zip -d native-ios/SDK
          echo ""
          echo "=== SDK structure ==="
          find native-ios/SDK -maxdepth 5 -type d | sort | head -80
          echo ""
          echo "=== xcframeworks ==="
          find native-ios/SDK -name "*.xcframework" -maxdepth 4 | sort
          echo ""
          echo "=== xcodeproj in SDK ==="
          find native-ios/SDK -name "*.xcodeproj" 2>/dev/null || echo "(none)"

      # ---- 2. 安装 xcodegen ----
      - name: Install xcodegen
        run: brew install xcodegen

      # ---- 3. 生成 project.yml 并创建 Xcode 工程 ----
      - name: Generate Xcode Project
        run: |
          set -e
          cd native-ios

          # 发现所有 xcframework 路径
          echo "Discovering frameworks..."
          FW_PATHS=$(find SDK -name "*.xcframework" -maxdepth 5 -type d | sort)
          echo "Found:"
          echo "$FW_PATHS"

          # 生成依赖声明
          FW_DEPS=""
          EMBED_FWS=""
          for fw in $FW_PATHS; do
            FW_NAME=$(basename "$fw" .xcframework)
            FW_DEPS="$FW_DEPS
            - framework: $fw
              embed: true"
          done

          # 写 project.yml
          cat > project.yml << YMLEND
          name: UniAppShell
          options:
            bundleIdPrefix: com.qingfeng
            deploymentTarget:
              iOS: "12.0"
          targets:
            UniAppShell:
              type: application
              platform: iOS
              sources:
                - UniAppShell
              settings:
                base:
                  INFOPLIST_FILE: UniAppShell/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.qingfeng.iosweb
                  OTHER_LINKER_FLAGS: "-ObjC -ld_classic -weak_framework SwiftUI"
                  FRAMEWORK_SEARCH_PATHS: "\$(SRCROOT)/SDK/Libs"
                  ENABLE_USER_SCRIPT_SANDBOXING: NO
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: "NO"
                  CODE_SIGNING_ALLOWED: "NO"
              dependencies:$FW_DEPS
                - sdk: JavaScriptCore.framework
                - sdk: libc++.tbd
              preBuildScripts:
                - name: "Copy uni-app x Resources"
                  script: |
                    set -e
                    RES_SRC="\${SRCROOT}/../../unpackage/resources/app-ios/__UNI__447C18F"
                    DST="\${BUILT_PRODUCTS_DIR}/\${PRODUCT_NAME}.app/uni-app-x/apps/__UNI__447C18F"
                    mkdir -p "\${DST}"
                    cp -R "\${RES_SRC}/www/" "\${DST}/"
                    echo "Resources copied to \${DST}"
          YMLEND

          echo ""
          echo "=== Generated project.yml ==="
          cat project.yml
          echo ""

          # 生成 Xcode 工程
          xcodegen generate
          echo "Xcode project generated"
          ls -la UniAppShell.xcodeproj/

      # ---- 4. 编译 (不签名) ----
      - name: Build IPA
        run: |
          set -e
          cd native-ios

          echo "=== Building (no signing) ==="
          xcodebuild \
            -project UniAppShell.xcodeproj \
            -scheme UniAppShell \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee /tmp/build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            echo ""
            echo "=== BUILD FAILED ==="
            echo "Last 30 lines of build log:"
            tail -30 /tmp/build.log
            exit 1
          fi

          echo ""
          echo "=== Build SUCCESS ==="

          # 找到 .app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "UniAppShell.app" -path "*/Release-iphoneos/*" | head -1)
          echo "App path: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -10
            exit 1
          fi

          # 打包 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "../iosweb.ipa" Payload/
          rm -rf Payload
          echo ""
          echo "=== IPA generated ==="
          ls -lh ../iosweb.ipa

      # ---- 5. 上传 IPA ----
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iosweb-offline-${{ github.run_number }}.ipa
          path: "iosweb.ipa"
          retention-days: 7
